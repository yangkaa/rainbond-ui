name: orchestrator-stage-ui

on:
  workflow_call:
    inputs:
      feature_id:
        required: true
        type: string
      engine:
        required: true
        type: string
      strict_verify:
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      feature_id:
        description: Feature ID (e.g. RB-123)
        required: true
        type: string
      engine:
        description: Engine used by orchestrator
        required: true
        default: opencode
        type: choice
        options:
          - opencode
          - claude
      strict_verify:
        description: Run stricter verification commands
        required: true
        default: false
        type: boolean

jobs:
  verify-ui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: yangkaa/rainbond-ui
          ref: workflow

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Execute UI stage checks
        id: verify_ui
        shell: bash
        run: |
          set -uo pipefail
          FEATURE_ID="${{ inputs.feature_id }}"
          ENGINE="${{ inputs.engine }}"
          STRICT="${{ inputs.strict_verify }}"

          mkdir -p /tmp/orchestrator
          RAW_LOG="/tmp/orchestrator/raw-ui-${FEATURE_ID}.log"
          SUMMARY_JSON="/tmp/orchestrator/verify-summary-ui-${FEATURE_ID}.json"

          {
            echo "feature_id=${FEATURE_ID}"
            echo "engine=${ENGINE}"
            echo "strict_verify=${STRICT}"
            echo "repo=rainbond-ui"
            echo "stage=ui"
            echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "pwd=$(pwd)"
            ls -la
          } > "${RAW_LOG}"

          rc=0
          if [[ "${STRICT}" == "true" ]]; then
            {
              echo "running: yarn --version"
              yarn --version
              echo "running: yarn install --frozen-lockfile"
              yarn install --frozen-lockfile
              echo "running: yarn build"
              yarn build
            } >> "${RAW_LOG}" 2>&1 || rc=$?
          else
            {
              echo "running: node --version"
              node --version
              echo "running: yarn --version"
              yarn --version
            } >> "${RAW_LOG}" 2>&1 || rc=$?
          fi

          status="passed"
          if [[ "${rc}" -ne 0 ]]; then
            status="failed"
          fi

          cat > "${SUMMARY_JSON}" <<JSON
          {
            "feature_id": "${FEATURE_ID}",
            "repo": "rainbond-ui",
            "stage": "ui",
            "engine": "${ENGINE}",
            "strict_verify": ${STRICT},
            "status": "${status}"
          }
          JSON

          echo "rc=${rc}" >> "$GITHUB_OUTPUT"
          cat "${SUMMARY_JSON}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload raw ui verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-raw-ui-${{ inputs.feature_id }}
          path: /tmp/orchestrator/raw-ui-${{ inputs.feature_id }}.log

      - name: Upload ui summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-summary-ui-${{ inputs.feature_id }}
          path: /tmp/orchestrator/verify-summary-ui-${{ inputs.feature_id }}.json

      - name: Print raw ui log to summary
        if: always()
        shell: bash
        run: |
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat "/tmp/orchestrator/raw-ui-${{ inputs.feature_id }}.log" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when ui checks failed
        if: steps.verify_ui.outputs.rc != '0'
        run: exit 1
